name: CrediShield AI CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. Backend Verification Job
  backend-ci:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest flake8

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 backend/app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # 2. Frontend Verification Job
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install NPM Packages
      run: |
        cd frontend
        npm ci

    - name: Build Production Assets
      run: |
        cd frontend
        npm run build

  # 3. Docker Compilation Verification Job
  docker-build-check:
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Verify Backend Docker Build
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: false

    - name: Verify Frontend Docker Build
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: false
